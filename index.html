<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prism Insight - AI Report</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --text-main: #ffffff;
            --text-sub: #8b949e;
            --accent-hot: #f85149;
            --accent-cool: #58a6ff;
            --accent-open: #2ea043; 
            --accent-close: #000000; /* 휴장 시 검은색 */
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color); color: var(--text-main);
            margin: 0; padding: 15px; line-height: 1.5;
            overscroll-behavior-y: contain;
        }

        .container { max-width: 480px; margin: 0 auto; }
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; 
        }
        .logo { font-size: 20px; font-weight: 800; color: #58a6ff; }
        .date { font-size: 11px; color: var(--text-sub); margin-bottom: 4px; }

        .refresh-btn {
            background: rgba(88, 166, 255, 0.1); border: 1px solid var(--border-color);
            color: var(--accent-cool); border-radius: 12px; padding: 5px 10px;
            font-size: 11px; cursor: pointer; display: flex; align-items: center; gap: 4px;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinning { animation: spin 1s linear infinite; }

        .section-title { font-size: 16px; font-weight: 700; margin: 25px 0 12px 0; color: #c9d1d9; border-left: 4px solid #58a6ff; padding-left: 10px; }
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .market-card { background: var(--card-bg); padding: 12px; border-radius: 12px; border: 1px solid var(--border-color); position: relative; overflow: hidden; }
        .m-name { font-size: 11px; color: var(--text-sub); display: flex; align-items: center; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; border: 1px solid #30363d; }
        
        .up { color: var(--accent-hot); } .down { color: var(--accent-cool); }

        .sector-card, .news-item { background: var(--card-bg); padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); margin-bottom: 10px; }
        .sector-card.HOT { border-left: 4px solid var(--accent-hot); }
        .sector-card.Positive { border-left: 4px solid var(--accent-cool); }
        
        .news-item { text-decoration: none; color: inherit; font-size: 13px; display: block; border: 1px solid #30363d; transition: background 0.2s; }
        .news-item:active { background: #30363d; }
        
        .summary-box { background: rgba(88, 166, 255, 0.05); padding: 15px; border-radius: 12px; border: 1px dashed #30363d; font-size: 13.5px; }
        .pick-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .pick-item { background: #21262d; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #30363d; font-size: 12px; font-weight: 600; }

        .chart-container { background: var(--card-bg); border-radius: 15px; padding: 15px; border: 1px solid var(--border-color); margin-bottom: 30px; height: 260px; }
        .hit-value { font-size: 28px; font-weight: 900; color: var(--accent-hot); margin-top: 5px; }

        /* 팝업 오버레이 */
        #news-overlay {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 420px; background: #1c2128; border: 1px solid var(--accent-cool);
            border-radius: 16px; padding: 20px; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.9);
            max-height: 85vh; overflow-y: auto;
        }
        #overlay-bg { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:999; }
        .source-label { font-size: 10px; font-weight: bold; color: var(--accent-cool); background: rgba(88, 166, 255, 0.1); padding: 2px 6px; border-radius: 4px; margin-right: 8px; border: 0.5px solid var(--accent-cool); }
        .overlay-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; border-bottom: 1px solid #30363d; padding-bottom: 10px; }
        .overlay-close { cursor: pointer; font-size: 32px; color: var(--text-sub); line-height: 0.8; }
        .external-btn { display: block; text-align: center; background: #238636; color: white; text-decoration: none; padding: 14px; border-radius: 10px; font-size: 14px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div id="overlay-bg" onclick="closeNews()"></div>
    <div id="news-overlay"></div>

    <div class="container">
        <header>
            <div class="logo">PRISM INSIGHT 💎</div>
            <div style="text-align: right;">
                <div id="report-date" class="date">연결 중...</div>
                <button id="refresh-btn" class="refresh-btn" onclick="manualRefresh()">
                    <span id="refresh-icon">🔄</span> 업데이트
                </button>
            </div>
        </header>

        <div id="market-indices" class="market-grid"></div>
        <div class="section-title">시장 요약</div>
        <div id="summary" class="summary-box"></div>
        <div class="section-title">주요 섹터 현황</div>
        <div id="sectors-list"></div>
        <div class="section-title">AI 분석 핵심 키워드 (클릭 시 출처 확인)</div>
        <div id="chart_div" style="width: 100%; height: 250px; background: var(--card-bg); border-radius:12px; border:1px solid var(--border-color); overflow:hidden;"></div>
        <div class="section-title">글로벌 주요 뉴스</div>
        <div id="news-list"></div>
        <div class="section-title">오늘의 AI 추천 종목</div>
        <div id="picks-list" class="pick-list"></div>
        
        <div class="section-title">전일 추천 수익률</div>
        <div id="past-results" class="pick-list"></div>

        <div class="section-title">누적 적중률 히스토리 (30일)</div>
        <div class="chart-container">
            <canvas id="hitRateChart"></canvas>
            <div style="text-align: center; border-top: 1px solid #30363d; margin-top: 10px; padding-top: 10px;">
                <div id="hit-rate-value" class="hit-value">0%</div>
                <div style="font-size: 11px; color: var(--text-sub);">현재 누적 적중률</div>
            </div>
        </div>
    </div>

    <script>
        google.charts.load('current', {'packages':['treemap']});
        let cachedData = null;
        let myChart = null;

        async function updateUI() {
            const v = new Date().getTime();
            try {
                const [res, hRes] = await Promise.all([
                    fetch(`recommendations.json?v=${v}`),
                    fetch(`history.json?v=${v}`)
                ]);
                cachedData = await res.json();
                const history = await hRes.json();

                document.getElementById('report-date').innerText = cachedData.date;
                document.getElementById('summary').innerText = cachedData.summary;

                // [수정] 지수 렌더링 (개장:녹색 / 휴장:검은색)
                document.getElementById('market-indices').innerHTML = Object.entries(cachedData.market_info).map(([k, v]) => {
                    const pureStatus = v.status.replace(/[●○()]/g, '').trim();
                    let dotColor = pureStatus.toLowerCase().includes('open') ? 'var(--accent-open)' : 'var(--accent-close)';
                    return `
                    <div class="market-card" style="border-top: 2px solid ${dotColor}">
                        <div class="m-name"><span class="status-dot" style="background:${dotColor}"></span>${k}</div>
                        <div style="font-size:16px; font-weight:700; margin: 4px 0;">${v.price.toLocaleString()}</div>
                        <div class="${v.change >= 0 ? 'up' : 'down'}" style="font-size:12px;">${v.change >= 0 ? '▲' : '▼'} ${Math.abs(v.change)}%</div>
                    </div>`;
                }).join('');

                document.getElementById('sectors-list').innerHTML = cachedData.sectors.map(s => `
                    <div class="sector-card ${s.sentiment}">
                        <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:bold;">
                            <span>${s.name}</span><span style="color:${s.sentiment==='HOT'?'#f85149':'#58a6ff'}">${s.sentiment}</span>
                        </div>
                        <div style="font-size:11px; color:#8b949e; margin-top:5px;">${s.reason}</div>
                    </div>`).join('');

                document.getElementById('news-list').innerHTML = cachedData.news_headlines.map(n => `
                    <a href="${n.link}" class="news-item" target="_blank">📰 ${n.title}</a>`).join('');

                document.getElementById('picks-list').innerHTML = cachedData.tickers.map(t => `<div class="pick-item">${t.name}</div>`).join('');

                // [복구] 전일 수익률 렌더링 로직
                if(cachedData.past_results) {
                    document.getElementById('past-results').innerHTML = cachedData.past_results.map(r => `
                        <div class="pick-item">
                            <div style="font-size:10px; color:var(--text-sub);">${r.ticker}</div>
                            <div class="${r.change >= 0 ? 'up' : 'down'}">${r.change >= 0 ? '+' : ''}${r.change}%</div>
                        </div>`).join('');
                }

                if (cachedData.keywords) google.charts.setOnLoadCallback(() => drawTreeMap(cachedData.keywords));
                processHitRate(history);
            } catch (err) { console.error(err); }
        }

        function drawTreeMap(keywords) {
            const chartData = [['Keyword', 'Parent', 'Weight']];
            chartData.push(['Global', null, 0]);
            keywords.forEach(k => chartData.push([k.name, 'Global', k.weight]));
            const tree = new google.visualization.TreeMap(document.getElementById('chart_div'));
            tree.draw(google.visualization.arrayToDataTable(chartData), {
                minColor: '#1a1f26', midColor: '#1f6feb', maxColor: '#58a6ff',
                headerHeight: 0, fontColor: '#ffffff', fontSize: 12, useWeightedAverageForColor: true
            });
            google.visualization.events.addListener(tree, 'select', () => {
                const sel = tree.getSelection();
                if (sel.length > 0) {
                    const kwName = google.visualization.arrayToDataTable(chartData).getValue(sel[0].row, 0);
                    if (kwName !== 'Global') showKeywordSources(kwName);
                    tree.setSelection([]);
                }
            });
        }

        // [수정] 팝업 함수 (불필요한 문구 완전 삭제 및 링크만 노출)
        function showKeywordSources(kwName) {
            const matchingNews = cachedData.news_headlines.filter(n => n.title.toLowerCase().includes(kwName.toLowerCase()));
            const externalUrl = `https://www.google.com/search?q=${encodeURIComponent(kwName)}+현황+뉴스`;

            let html = `
                <div class="overlay-header">
                    <b style="color:var(--accent-cool); font-size:18px;"># ${kwName} 데이터 근거</b>
                    <span class="overlay-close" onclick="closeNews()">&times;</span>
                </div>
            `;

            if (matchingNews.length > 0) {
                html += `<div style="font-size:11px; color:var(--text-sub); margin-bottom:10px;">📌 수집된 관련 뉴스</div>`;
                html += matchingNews.map(n => `
                    <a href="${n.link}" target="_blank" class="news-item" style="margin-bottom:8px; padding:12px;">
                        <span class="source-label">REPORT NEWS</span> ${n.title}
                    </a>`).join('');
            }

            html += `
                <div style="font-size:11px; color:var(--text-sub); margin-top:20px; margin-bottom:10px;">🌐 외부 전문 정보 출처</div>
                <a href="${externalUrl}" target="_blank" class="external-btn">
                    🔎 '${kwName}' 실시간 데이터 확인하기
                </a>
            `;

            document.getElementById('news-overlay').innerHTML = html;
            document.getElementById('news-overlay').style.display = 'block';
            document.getElementById('overlay-bg').style.display = 'block';
        }

        function processHitRate(history) {
            let totalPicks = 0, totalHits = 0;
            const labels = [];
            const dataPoints = [];
            history.slice(-30).forEach(day => {
                day.performance.forEach(p => { totalPicks++; if(p.change > 0) totalHits++; });
                labels.push(day.date.split(' ')[0].substring(5));
                dataPoints.push(totalPicks > 0 ? (totalHits / totalPicks * 100).toFixed(1) : 0);
            });
            document.getElementById('hit-rate-value').innerText = dataPoints[dataPoints.length-1] + "%";
            drawChart(labels, dataPoints);
        }

        function drawChart(labels, dataPoints) {
            const ctx = document.getElementById('hitRateChart').getContext('2d');
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataPoints, borderColor: '#58a6ff', backgroundColor: 'rgba(88, 166, 255, 0.1)',
                        fill: true, tension: 0.4, borderWidth: 2, pointRadius: 2
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e', font: {size: 10} } },
                        x: { grid: { display: false }, ticks: { color: '#8b949e', font: {size: 10} } }
                    }
                }
            });
        }

        async function manualRefresh() {
            const icon = document.getElementById('refresh-icon');
            icon.classList.add('spinning');
            await updateUI();
            setTimeout(() => icon.classList.remove('spinning'), 800);
        }

        function closeNews() {
            document.getElementById('news-overlay').style.display = 'none';
            document.getElementById('overlay-bg').style.display = 'none';
        }

        updateUI();
    </script>
</body>
</html>
